<!DOCTYPE html>
<html lang="fa">

<head>
<meta charset="UTF-8">
<title>پنل ادمین - مزون ایلا</title>

<style>

body{
  font-family:tahoma;
  background:#0f0f0f;
  color:white;
  padding:20px;
  margin:0;
}

h1,h2{
  color:#ff2d55;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  box-sizing:border-box;
}

button{
  background:#ff2d55;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:12px;
  cursor:pointer;
  margin-top:10px;
  font-size:15px;
}

button:hover{
  opacity:0.9;
}

.card{
  background:#1a1a1a;
  padding:15px;
  border-radius:18px;
  margin-top:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}

img{
  width:120px;
  border-radius:12px;
}

#loginBox{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginCard{
  background:#1b1b1b;
  padding:30px;
  border-radius:25px;
  width:320px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.replyBox{
  margin-top:10px;
}

.section{
  margin-top:40px;
}

.smallBtn{
  background:#333;
}

.deleteBtn{
  background:#c4002f;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginBox">

  <div class="loginCard">

    <h2>ورود ادمین 🔐</h2>

    <input id="user" placeholder="یوزرنیم">

    <input id="pass" type="password" placeholder="پسورد">

    <button onclick="login()">
      ورود
    </button>

    <p id="msg"></p>

  </div>

</div>

<!-- PANEL -->

<div id="panel" style="display:none;">

  <div class="top">

    <h1>⚙️ پنل ادمین مزون ایلا</h1>

    <button onclick="logout()">
      خروج 🚪
    </button>

  </div>

  <!-- ADD PRODUCT -->

  <div class="section">

    <h2>➕ افزودن محصول</h2>

    <input id="name" placeholder="نام محصول">

    <input id="price" placeholder="قیمت">

    <input id="image" placeholder="لینک عکس">

    <button onclick="addProduct()">
      افزودن محصول
    </button>

  </div>

  <!-- PRODUCTS -->

  <div class="section">

    <h2>📦 محصولات</h2>

    <button class="smallBtn" onclick="loadProducts()">
      رفرش محصولات
    </button>

    <div id="products"></div>

  </div>

  <!-- ORDERS -->

  <div class="section">

    <h2>🧾 سفارش‌ها</h2>

    <button class="smallBtn" onclick="loadOrders()">
      رفرش سفارش‌ها
    </button>

    <div id="orders"></div>

  </div>

  <!-- SUPPORT -->

  <div class="section">

    <h2>💬 پشتیبانی</h2>

    <button class="smallBtn" onclick="loadSupport()">
      رفرش پیام‌ها
    </button>

    <div id="supportList"></div>

  </div>

</div>

<script>

/* LOGIN */

function login(){

  const user =
    document.getElementById("user").value;

  const pass =
    document.getElementById("pass").value;

  if(user === "admin" && pass === "1234"){

    localStorage.setItem("admin","true");

    showPanel();

  }else{

    document.getElementById("msg")
    .innerText = "اطلاعات اشتباه است";

  }

}

function showPanel(){

  document.getElementById("loginBox")
  .style.display = "none";

  document.getElementById("panel")
  .style.display = "block";

  loadProducts();
  loadOrders();
  loadSupport();

}

if(localStorage.getItem("admin") === "true"){
  showPanel();
}

function logout(){

  localStorage.removeItem("admin");

  location.reload();

}

/* PRODUCTS */

async function addProduct(){

  const name =
    document.getElementById("name").value;

  const price =
    document.getElementById("price").value;

  const image =
    document.getElementById("image").value;

  if(!name || !price || !image){
    alert("همه فیلدها را کامل کن");
    return;
  }

  const res = await fetch("/add-product", {

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body: JSON.stringify({
      name,
      price,
      image
    })

  });

  const data = await res.json();

  if(data.success){

    alert("محصول اضافه شد ✅");

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("image").value = "";

    loadProducts();

  }

}

async function loadProducts(){

  const res = await fetch("/products");

  const products = await res.json();

  const box =
    document.getElementById("products");

  box.innerHTML = "";

  products.forEach(p => {

    box.innerHTML += `
      <div class="card">

        <img src="${p.image}">

        <h3>${p.name}</h3>

        <p>${p.price} تومان</p>

        <button class="deleteBtn"
        onclick="deleteProduct('${p.id}')">
          حذف محصول
        </button>

      </div>
    `;

  });

}

async function deleteProduct(id){

  await fetch("/delete-product/" + id, {
    method:"DELETE"
  });

  loadProducts();

}

/* ORDERS */

async function loadOrders(){

  const res = await fetch("/orders");

  const orders = await res.json();

  const box =
    document.getElementById("orders");

  box.innerHTML = "";

  orders.forEach(o => {

    box.innerHTML += `
      <div class="card">

        <h3>🧾 سفارش ${o.id}</h3>

        <p>💰 ${o.total} تومان</p>

        <p>👤 ${o.customer?.name || "-"}</p>

        <p>📞 ${o.customer?.phone || "-"}</p>

        <p>📍 ${o.customer?.address || "-"}</p>

        <button onclick="showItems('${o.id}')">
          مشاهده محصولات
        </button>

        <button class="deleteBtn"
        onclick="deleteOrder('${o.id}')">
          حذف سفارش
        </button>

      </div>
    `;

  });

}

function showItems(id){

  fetch("/orders")
  .then(res => res.json())
  .then(orders => {

    const order =
      orders.find(o => o.id === id);

    if(!order) return;

    let text = "";

    order.items.forEach(i => {

      text += `
${i.name}
${i.price} تومان

`;

    });

    alert(text);

  });

}

async function deleteOrder(id){

  await fetch("/delete-order/" + id, {
    method:"DELETE"
  });

  loadOrders();

}

/* SUPPORT */

async function loadSupport(){

  const res = await fetch("/support");

  const data = await res.json();

  const box =
    document.getElementById("supportList");

  box.innerHTML = "";

  data.forEach(m => {

    box.innerHTML += `
      <div class="card">

        <h3>${m.name}</h3>

        <p>${m.msg}</p>

        <p>
          پاسخ:
          ${m.reply || "هنوز پاسخ داده نشده"}
        </p>

        <div class="replyBox">

          <textarea
          id="reply-${m.id}"
          placeholder="پاسخ ادمین"></textarea>

          <button onclick="sendReply('${m.id}')">
            ارسال پاسخ
          </button>

        </div>

      </div>
    `;

  });

}

async function sendReply(id){

  const reply =
    document.getElementById("reply-" + id).value;

  await fetch("/support/reply/" + id, {

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body: JSON.stringify({
      reply
    })

  });

  alert("پاسخ ارسال شد ✅");

  loadSupport();

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fa">

<head>
<meta charset="UTF-8">
<title>پنل ادمین - مزون ایلا</title>

<style>

body{
  font-family:tahoma;
  background:#0f0f0f;
  color:white;
  padding:20px;
  margin:0;
}

h1,h2{
  color:#ff2d55;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  box-sizing:border-box;
}

button{
  background:#ff2d55;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:12px;
  cursor:pointer;
  margin-top:10px;
  font-size:15px;
}

button:hover{
  opacity:0.9;
}

.card{
  background:#1a1a1a;
  padding:15px;
  border-radius:18px;
  margin-top:15px;
}

img{
  width:120px;
  border-radius:12px;
}

#loginBox{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginCard{
  background:#1b1b1b;
  padding:30px;
  border-radius:25px;
  width:320px;
}

.section{ margin-top:40px; }

.deleteBtn{
  background:#c4002f;
}

.smallBtn{
  background:#333;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="loginCard">

    <h2>ورود ادمین 🔐</h2>

    <input id="user" placeholder="یوزرنیم">
    <input id="pass" type="password" placeholder="پسورد">

    <button onclick="login()">ورود</button>
    <p id="msg"></p>

  </div>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

  <div style="display:flex;justify-content:space-between;">
    <h1>⚙️ پنل ادمین</h1>
    <button onclick="logout()">خروج 🚪</button>
  </div>

  <!-- ADD PRODUCT -->
  <div class="section">

    <h2>➕ افزودن محصول</h2>

    <input id="name" placeholder="نام محصول">
    <input id="price" placeholder="قیمت">

    <!-- ✅ آپلود عکس -->
    <input type="file" id="imageFile">

    <button onclick="addProduct()">افزودن محصول</button>

  </div>

  <!-- PRODUCTS -->
  <div class="section">

    <h2>📦 محصولات</h2>
    <button class="smallBtn" onclick="loadProducts()">رفرش</button>

    <div id="products"></div>

  </div>

  <!-- ORDERS -->
  <div class="section">

    <h2>🧾 سفارش‌ها</h2>
    <button class="smallBtn" onclick="loadOrders()">رفرش</button>

    <div id="orders"></div>

  </div>

  <!-- SUPPORT -->
  <div class="section">

    <h2>💬 پشتیبانی</h2>
    <button class="smallBtn" onclick="loadSupport()">رفرش</button>

    <div id="supportList"></div>

  </div>

</div>

<script>

/* LOGIN */
function login(){
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user === "admin" && pass === "1234"){
    localStorage.setItem("admin","true");
    showPanel();
  } else {
    document.getElementById("msg").innerText = "اشتباه است";
  }
}

function showPanel(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("panel").style.display="block";

  loadProducts();
  loadOrders();
  loadSupport();
}

if(localStorage.getItem("admin")==="true"){
  showPanel();
}

function logout(){
  localStorage.removeItem("admin");
  location.reload();
}

/* =========================
   PRODUCTS
========================= */

async function addProduct(){

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("imageFile").files[0];

  if(!name || !price || !file){
    alert("همه فیلدها را پر کن");
    return;
  }

  const formData = new FormData();
  formData.append("name", name);
  formData.append("price", price);
  formData.append("image", file);

  const res = await fetch("/add-product", {
    method:"POST",
    body:formData
  });

  const data = await res.json();

  if(data.success){
    alert("محصول اضافه شد");
    document.getElementById("name").value="";
    document.getElementById("price").value="";
    document.getElementById("imageFile").value="";
    loadProducts();
  }
}

async function loadProducts(){

  const res = await fetch("/products");
  const data = await res.json();

  const box = document.getElementById("products");
  box.innerHTML="";

  data.forEach(p=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price} تومان</p>
        <button class="deleteBtn" onclick="deleteProduct('${p.id}')">حذف</button>
      </div>
    `;
  });
}

async function deleteProduct(id){
  await fetch("/delete-product/"+id,{method:"DELETE"});
  loadProducts();
}

/* =========================
   ORDERS
========================= */

async function loadOrders(){

  const res = await fetch("/orders");
  const data = await res.json();

  const box = document.getElementById("orders");
  box.innerHTML="";

  data.forEach(o=>{
    box.innerHTML += `
      <div class="card">
        <h3>سفارش ${o.id}</h3>
        <p>💰 ${o.total}</p>
        <p>👤 ${o.customer?.name}</p>
        <p>📞 ${o.customer?.phone}</p>
        <p>📍 ${o.customer?.address}</p>

        <button class="deleteBtn" onclick="deleteOrder('${o.id}')">حذف</button>
      </div>
    `;
  });
}

async function deleteOrder(id){
  await fetch("/delete-order/"+id,{method:"DELETE"});
  loadOrders();
}

/* =========================
   SUPPORT
========================= */

async function loadSupport(){

  const res = await fetch("/support");
  const data = await res.json();

  const box = document.getElementById("supportList");
  box.innerHTML="";

  data.forEach(m=>{
    box.innerHTML += `
      <div class="card">
        <h3>${m.name}</h3>
        <p>${m.msg}</p>

        <textarea id="r-${m.id}" placeholder="پاسخ"></textarea>

        <button onclick="reply('${m.id}')">ارسال پاسخ</button>
        <button class="deleteBtn" onclick="deleteSupport('${m.id}')">حذف</button>
      </div>
    `;
  });
}

async function reply(id){
  const reply = document.getElementById("r-"+id).value;

  await fetch("/support/reply/"+id,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({reply})
  });

  loadSupport();
}

async function deleteSupport(id){
  await fetch("/support/"+id,{method:"DELETE"});
  loadSupport();
}

</script>

</body>
</html>

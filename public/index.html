<!DOCTYPE html>
<html lang="fa">

<head>
<meta charset="UTF-8">
<title>مزون ایلا</title>

<style>

body{
  background:#f5f5f5;
  font-family:tahoma;
  padding:20px;
  margin:0;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.info{
  padding:15px;
}

.price{
  color:red;
  font-size:20px;
  font-weight:bold;
}

button{
  background:red;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  cursor:pointer;
  border-radius:10px;
  margin-top:5px;
}

button:hover{
  opacity:0.9;
}

/* سبد خرید */

#cartBox{
  position:fixed;
  top:0;
  right:-400px;
  width:350px;
  height:100%;
  background:#111;
  color:white;
  padding:20px;
  transition:0.4s;
  overflow:auto;
  z-index:999;
}

#cartBox.active{
  right:0;
}

.closeBtn{
  background:black;
  margin-bottom:15px;
}

.cartItem{
  display:flex;
  gap:10px;
  border-bottom:1px solid #444;
  padding:10px 0;
}

.cartItem img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

/* پشتیبانی */

#supportBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:red;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  z-index:999;
}

#supportBox{
  position:fixed;
  bottom:90px;
  left:20px;
  width:320px;
  background:white;
  border-radius:15px;
  padding:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
  display:none;
  z-index:999;
}

#supportBox textarea{
  width:100%;
  height:100px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:10px;
}

</style>

</head>

<body>

<!-- هدر -->

<div class="topbar">

  <h1>مزون ایلا</h1>

  <h2 onclick="openCart()" style="cursor:pointer">
    🛒 سبد خرید:
    <span id="cartCount">0</span>
  </h2>

</div>

<!-- محصولات -->

<div id="products"></div>

<!-- سبد خرید -->

<div id="cartBox">

<button class="closeBtn" onclick="openCart()">
✖ بستن
</button>

<h2>سبد خرید 🛒</h2>

<div id="cartItems"></div>

<h3 id="totalPrice">مجموع: 0 تومان</h3>

<hr>

<h3>اطلاعات مشتری</h3>

<input id="name" placeholder="نام">

<input id="phone" placeholder="شماره">

<input id="address" placeholder="آدرس">

<button onclick="clearCart()">
خالی کردن سبد
</button>

<button onclick="checkout()">
ثبت سفارش
</button>

</div>

<!-- دکمه پشتیبانی -->

<div id="supportBtn" onclick="openSupport()">
💬
</div>

<!-- باکس پشتیبانی -->

<div id="supportBox">

<h3>پشتیبانی آنلاین</h3>

<input id="supportName" placeholder="نام">

<textarea id="supportMsg" placeholder="پیام..."></textarea>

<button onclick="sendSupport()">
ارسال پیام
</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

loadProducts();
updateCart();

/* =========================
   محصولات
========================= */

async function loadProducts(){

  const res = await fetch("/products");
  const data = await res.json();

  const box = document.getElementById("products");

  box.innerHTML = "";

  data.forEach(p => {

    box.innerHTML += `
      <div class="card">

        <img src="${p.image}">

        <div class="info">

          <h3>${p.name}</h3>

          <p class="price">
            ${p.price} تومان
          </p>

          <button onclick='addToCart(${JSON.stringify(p)})'>
            افزودن
          </button>

        </div>

      </div>
    `;

  });

}

/* =========================
   سبد خرید
========================= */

function addToCart(p){

  cart.push(p);

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCart();

}

function updateCart(){

  document.getElementById("cartCount")
  .innerText = cart.length;

  let box =
    document.getElementById("cartItems");

  box.innerHTML = "";

  let total = 0;

  cart.forEach((item, i) => {

    total += Number(item.price);

    box.innerHTML += `
      <div class="cartItem">

        <img src="${item.image}">

        <div>

          <p>${item.name}</p>

          <p>${item.price} تومان</p>

          <button onclick="removeItem(${i})">
            حذف
          </button>

        </div>

      </div>
    `;

  });

  document.getElementById("totalPrice")
  .innerText =
    "مجموع: " + total + " تومان";

}

function removeItem(i){

  cart.splice(i,1);

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCart();

}

function clearCart(){

  cart = [];

  localStorage.removeItem("cart");

  updateCart();

}

function openCart(){

  document.getElementById("cartBox")
  .classList.toggle("active");

}

/* =========================
   ثبت سفارش
========================= */

async function checkout(){

  if(cart.length === 0){
    alert("سبد خالی است");
    return;
  }

  const name =
    document.getElementById("name").value;

  const phone =
    document.getElementById("phone").value;

  const address =
    document.getElementById("address").value;

  if(!name || !phone || !address){

    alert("اطلاعات کامل نیست");

    return;

  }

  let total = 0;

  cart.forEach(i => {
    total += Number(i.price);
  });

  const res = await fetch("/create-order", {

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body: JSON.stringify({

      items: cart,

      total,

      customer: {
        name,
        phone,
        address
      }

    })

  });

  const data = await res.json();

  if(data.success){

    alert("سفارش ثبت شد ✅");

    cart = [];

    localStorage.removeItem("cart");

    updateCart();

  } else {

    alert("خطا ❌");

  }

}

/* =========================
   پشتیبانی
========================= */

function openSupport(){

  const box =
    document.getElementById("supportBox");

  if(box.style.display === "block"){

    box.style.display = "none";

  } else {

    box.style.display = "block";

  }

}

async function sendSupport(){

  const name =
    document.getElementById("supportName").value;

  const msg =
    document.getElementById("supportMsg").value;

  if(!name || !msg){

    alert("فیلدها کامل نیست");

    return;

  }

  const res = await fetch("/support", {

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body: JSON.stringify({
      name,
      msg
    })

  });

  const data = await res.json();

  if(data.success){

    alert("پیام ارسال شد ✅");

    document.getElementById("supportMsg").value = "";

  } else {

    alert("خطا ❌");

  }

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>مزون ایلا</title>

  <style>
    body{
      background:white;
      font-family:tahoma;
      padding:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    #products{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      border:1px solid #ddd;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .info{
      padding:15px;
    }

    .price{
      color:red;
      font-size:20px;
    }

    button{
      background:red;
      color:white;
      border:none;
      padding:10px;
      width:100%;
      cursor:pointer;
      border-radius:10px;
      margin-top:5px;
    }

    #cartBox{
      position:fixed;
      top:0;
      right:-400px;
      width:350px;
      height:100%;
      background:#111;
      color:white;
      padding:20px;
      transition:0.4s;
      overflow:auto;
    }

    #cartBox.active{
      right:0;
    }

    .cartItem{
      display:flex;
      gap:10px;
      border-bottom:1px solid #444;
      padding:10px 0;
    }

    .cartItem img{
      width:70px;
      height:70px;
      object-fit:cover;
      border-radius:10px;
    }

    input{
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:8px;
      border:none;
    }
  </style>

</head>

<body>

<div class="topbar">
  <h1>مزون ایلا</h1>

  <h2 onclick="openCart()" style="cursor:pointer">
    🛒 سبد خرید: <span id="cartCount">0</span>
  </h2>
</div>

<div id="products"></div>

<div id="cartBox">

  <h2>سبد خرید 🛒</h2>

  <div id="cartItems"></div>

  <h3 id="totalPrice">مجموع: 0 تومان</h3>

  <hr>

  <h3>اطلاعات مشتری</h3>

  <input id="name" placeholder="نام">
  <input id="phone" placeholder="شماره">
  <input id="address" placeholder="آدرس">

  <button onclick="clearCart()">خالی کردن سبد</button>
  <button onclick="checkout()">ثبت سفارش</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

loadProducts();
updateCart();

/* =========================
   محصولات
========================= */

async function loadProducts(){

  const res = await fetch("/products");
  const data = await res.json();

  const box = document.getElementById("products");
  box.innerHTML = "";

  data.forEach(p => {
    box.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <div class="info">
          <h3>${p.name}</h3>
          <p class="price">${p.price} تومان</p>
          <button onclick='addToCart(${JSON.stringify(p)})'>افزودن</button>
        </div>
      </div>
    `;
  });
}

/* =========================
   سبد خرید
========================= */

function addToCart(p){
  cart.push(p);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function updateCart(){
  document.getElementById("cartCount").innerText = cart.length;

  let box = document.getElementById("cartItems");
  box.innerHTML = "";

  let total = 0;

  cart.forEach((item, i) => {
    total += Number(item.price);

    box.innerHTML += `
      <div class="cartItem">
        <img src="${item.image}">
        <div>
          <p>${item.name}</p>
          <p>${item.price}</p>
          <button onclick="removeItem(${i})">حذف</button>
        </div>
      </div>
    `;
  });

  document.getElementById("totalPrice").innerText =
    "مجموع: " + total + " تومان";
}

function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function clearCart(){
  cart = [];
  localStorage.removeItem("cart");
  updateCart();
}

function openCart(){
  document.getElementById("cartBox").classList.toggle("active");
}

/* =========================
   ثبت سفارش
========================= */

async function checkout(){

  if(cart.length === 0){
    alert("سبد خالی است");
    return;
  }

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("اطلاعات کامل نیست");
    return;
  }

  let total = 0;
  cart.forEach(i => total += Number(i.price));

  const res = await fetch("/create-order", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      items: cart,
      total,
      customer: { name, phone, address }
    })
  });

  const data = await res.json();

  if(data.success){
    alert("سفارش ثبت شد");
    cart = [];
    localStorage.removeItem("cart");
    updateCart();
  } else {
    alert("خطا");
  }
}

</script>

</body>
</html>

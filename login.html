<!DOCTYPE html>
<html lang="fa">

<head>
<meta charset="UTF-8">
<title>ورود ادمین</title>

<style>

body{
  font-family:tahoma;
  background:#111;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#222;
  padding:20px;
  border-radius:15px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  width:100%;
  padding:10px;
  background:red;
  color:white;
  border:none;
}

</style>

</head>

<body>

<div class="box">

<h2>ورود ادمین 🔐</h2>

<input id="user" placeholder="یوزرنیم">
<input id="pass" type="password" placeholder="پسورد">

<button onclick="login()">ورود</button>

<p id="msg"></p>

</div>

<script>

function login(){

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user === "admin" && pass === "1234"){

    localStorage.setItem("admin", "true");

    window.location.href = "/admin.html";

  } else {
    document.getElementById("msg").innerText = "❌ اشتباه است";
  }

}

</script>

</body>
</html>
